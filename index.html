<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>好想瑟瑟 Prompt Rewriter</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">18+ consensual prompt atelier</p>
        <h1>好想瑟瑟 Prompt Rewriter</h1>
        <p>
          將直白成人提示詞轉成影像生成器更容易理解的情慾氛圍描述，並用光感、敬畏氣場與角色客製化維持原意、提升畫面質感。
        </p>
      </section>

      <section class="panel input-panel" aria-labelledby="input-title">
        <div class="section-heading">
          <p class="section-kicker">Step 01</p>
          <h2 id="input-title">輸入提示詞</h2>
        </div>

        <label for="sourcePrompt">原始描述</label>
        <textarea id="sourcePrompt" rows="7" placeholder="例如：脫衣服 親吻"></textarea>

        <div class="control-grid">
          <div class="field">
            <label for="intensity">情慾強度</label>
            <select id="intensity">
              <option value="soft">柔和</option>
              <option value="medium" selected>中等</option>
              <option value="strong">強烈</option>
            </select>
          </div>

          <div class="field">
            <label for="lighting">光感描述（20 種）</label>
            <select id="lighting"></select>
          </div>

          <div class="field">
            <label for="awe">敬畏描述（20 種）</label>
            <select id="awe"></select>
          </div>
        </div>

        <div class="section-heading compact">
          <p class="section-kicker">Step 02</p>
          <h2>角色客製化安排</h2>
          <p>臉蛋、服裝、人數、場景共 110 種可選安排。</p>
        </div>

        <div class="custom-grid">
          <div class="field">
            <label for="face">臉蛋</label>
            <select id="face"></select>
          </div>
          <div class="field">
            <label for="outfit">服裝</label>
            <select id="outfit"></select>
          </div>
          <div class="field">
            <label for="count">人數</label>
            <select id="count"></select>
          </div>
          <div class="field">
            <label for="scene">場景</label>
            <select id="scene"></select>
          </div>
        </div>

        <button id="rewriteButton" type="button">轉譯提示詞</button>
      </section>

      <section class="panel output-panel" aria-live="polite">
        <div class="section-heading">
          <p class="section-kicker">Step 03</p>
          <h2>轉譯結果</h2>
        </div>
        <p id="status" class="status">等待輸入。</p>
        <textarea id="resultPrompt" rows="12" readonly></textarea>
        <button id="copyButton" type="button" class="secondary-button">複製結果</button>
      </section>

      <section class="guardrails">
        <div class="section-heading">
          <p class="section-kicker">Safety</p>
          <h2>安全邊界</h2>
        </div>
        <ul>
          <li>只允許明確成年且合意的角色與情境。</li>
          <li>拒絕未成年、非合意、偷拍、血腥暴力等內容。</li>
          <li>輸出以氛圍、構圖、姿態、光影與情緒描述為主。</li>
        </ul>
      </section>
    </main>

    <script src="src/translator.js"></script>
    <script src="src/app.js"></script>
  </body>
</html>
